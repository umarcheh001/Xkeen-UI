<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src ws: wss:; img-src data:">
  <link rel="stylesheet" href="xterm.css">
  <style>
    html, body {
      width: 100%; height: 100%; min-height: 0;
      margin: 0; overflow: hidden; background: #01030a;
      -webkit-text-size-adjust: none; text-size-adjust: none;
    }
    body { padding: 0; }
    #terminal {
      /* WebView may first lay out this document while its Compose AndroidView has zero height.
         A fixed surface follows the visual viewport when the real size arrives; an absolute
         surface remains trapped in the resulting zero-height body and collapses to 40px. */
      position: fixed; inset: 5px 3px 3px 5px;
      width: auto; height: auto; min-width: 40px; min-height: 40px;
      background: #01030a; touch-action: pan-y;
    }
    .xterm { width: 100%; height: 100%; touch-action: pan-y; }
    .xterm-viewport {
      scrollbar-color: #334155 #01030a; scrollbar-width: thin;
      overscroll-behavior: contain; touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
    }
    /* Android WebView will not reliably open an IME for xterm's zero-sized off-screen textarea. */
    .xterm .xterm-helper-textarea {
      min-width: 1px !important; min-height: 1px !important;
      z-index: 0 !important; opacity: 0.01 !important; font-size: 16px !important;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="terminal" aria-label="Терминал Xkeen"></div>
  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script src="xterm-addon-search.js"></script>
  <script>
    (() => {
      'use strict';
      const TERMINAL_FONT_SIZE = 14;
      const TERMINAL_LINE_HEIGHT = 1.18;
      const RESIZE_SETTLE_DELAY_MS = 96;
      const terminal = new Terminal({
        cursorBlink: true,
        convertEol: false,
        scrollback: 10000,
        scrollOnUserInput: true,
        scrollSensitivity: 1.5,
        fontFamily: "monospace",
        fontSize: TERMINAL_FONT_SIZE,
        lineHeight: TERMINAL_LINE_HEIGHT,
        fontWeight: "normal",
        fontWeightBold: "bold",
        letterSpacing: 0,
        allowTransparency: false,
        theme: {
          background: '#01030a', foreground: '#d4d4d4', cursor: '#60a5fa',
          selectionBackground: '#1d4ed880', black: '#0f172a', red: '#f87171',
          green: '#4ade80', yellow: '#facc15', blue: '#60a5fa', magenta: '#c084fc',
          cyan: '#22d3ee', white: '#e2e8f0', brightBlack: '#64748b'
        }
      });
      const fitAddon = new FitAddon.FitAddon();
      const searchAddon = new SearchAddon.SearchAddon();
      terminal.loadAddon(fitAddon);
      terminal.loadAddon(searchAddon);
      const terminalHost = document.getElementById('terminal');

      let socket = null;
      let generation = 0;
      let sessionId = null;
      let lastSequence = 0;
      let reconnectAttempt = 0;
      let reconnectTimer = null;
      let reconnectRequested = false;
      let detached = false;
      let sessionEnded = false;
      let newSessionRequested = false;
      let sessionPublishTimer = null;
      let surfaceReady = false;
      let surfaceStarting = false;
      let fontsReady = false;
      let surfaceStartTimer = null;
      const surfaceWaitStartedAt = Date.now();
      let surfaceFailurePublished = false;
      let resizeTimer = null;
      let resizeFrame = null;
      let pendingResizePublish = false;
      let lastPublishedColumns = 0;
      let lastPublishedRows = 0;

      function hostHasSize() {
        const rect = terminalHost.getBoundingClientRect();
        return rect.width >= 40 && rect.height >= 40;
      }

      function recoverHostGeometry() {
        if (hostHasSize()) return true;

        // A fixed host is resolved against the WebView visual viewport even when the initial
        // percentage-height containing block was calculated while AndroidView was detached.
        terminalHost.style.position = 'fixed';
        terminalHost.style.inset = '5px 3px 3px 5px';
        terminalHost.style.width = 'auto';
        terminalHost.style.height = 'auto';
        terminalHost.style.minWidth = '40px';
        terminalHost.style.minHeight = '40px';
        return hostHasSize();
      }

      function configureInputMethod() {
        const textarea = terminalHost.querySelector('.xterm-helper-textarea');
        if (!textarea) return;
        textarea.setAttribute('autocapitalize', 'none');
        textarea.setAttribute('autocomplete', 'off');
        textarea.setAttribute('autocorrect', 'off');
        textarea.setAttribute('spellcheck', 'false');
        textarea.setAttribute('enterkeyhint', 'enter');
      }

      function refreshVisibleRows() {
        if (!surfaceReady) return;
        try { terminal.refresh(0, Math.max(0, terminal.rows - 1)); } catch (_) {}
      }

      function startSurface() {
        if (!fontsReady || surfaceReady || surfaceStarting || detached) return;
        clearTimeout(surfaceStartTimer);
        if (!hostHasSize() && !recoverHostGeometry()) {
          if (!surfaceFailurePublished && Date.now() - surfaceWaitStartedAt >= 4000) {
            surfaceFailurePublished = true;
            publishState(
              'error',
              'Не удалось подготовить область терминала. Повторите подключение.'
            );
          }
          surfaceStartTimer = setTimeout(startSurface, 50);
          return;
        }

        surfaceFailurePublished = false;
        surfaceStarting = true;
        try {
          terminal.open(terminalHost);
          configureInputMethod();
          surfaceReady = true;
        } catch (error) {
          publishState('error', `Не удалось запустить терминал: ${String(error)}`);
          return;
        } finally {
          surfaceStarting = false;
        }
        requestAnimationFrame(() => {
          const initialSize = fitSurface(false, false);
          refreshVisibleRows();
          terminal.writeln('\x1b[38;5;75mXkeen remote PTY\x1b[0m');
          try { AndroidTerminal.onReady(initialSize.cols, initialSize.rows); } catch (_) {}
        });
      }

      function currentDimensions() {
        return { cols: Math.max(2, terminal.cols || 80), rows: Math.max(1, terminal.rows || 24) };
      }

      function publishPtyResize(size, force) {
        if (!size) return false;
        if (!force && size.cols === lastPublishedColumns && size.rows === lastPublishedRows) return true;
        if (!send({ type: 'resize', cols: size.cols, rows: size.rows })) return false;
        lastPublishedColumns = size.cols;
        lastPublishedRows = size.rows;
        return true;
      }

      function proposedDimensions() {
        if (!hostHasSize()) return null;
        try {
          const proposed = fitAddon.proposeDimensions();
          if (!proposed) return null;
          const cols = Math.max(2, Math.floor(Number(proposed.cols) || 0));
          const rows = Math.max(1, Math.floor(Number(proposed.rows) || 0));
          return cols > 1 && rows > 0 ? { cols, rows } : null;
        } catch (_) {
          return null;
        }
      }

      function fitSurface(publishResize, forcePublish) {
        if (!surfaceReady) {
          startSurface();
          return currentDimensions();
        }
        const proposed = proposedDimensions();
        if (proposed && (proposed.cols !== terminal.cols || proposed.rows !== terminal.rows)) {
          const activeBuffer = terminal.buffer && terminal.buffer.active;
          const wasAtBottom = !activeBuffer || activeBuffer.viewportY >= activeBuffer.baseY;
          const distanceFromBottom = activeBuffer
            ? Math.max(0, activeBuffer.baseY - activeBuffer.viewportY)
            : 0;
          // FitAddon clears the old renderer frame before resizing, which avoids stale canvas
          // pixels when Android animates the IME and the WebView changes height.
          try { fitAddon.fit(); } catch (_) {}
          try {
            if (wasAtBottom) terminal.scrollToBottom();
            else terminal.scrollToLine(
              Math.max(0, terminal.buffer.active.baseY - distanceFromBottom)
            );
          } catch (_) {}
          // Vendor WebViews can briefly composite stale xterm tiles after the IME resizes the
          // AndroidView. Redraw now and once more on the next frame after the new rows settle.
          refreshVisibleRows();
          requestAnimationFrame(refreshVisibleRows);
        }
        const size = currentDimensions();
        if (publishResize) publishPtyResize(size, forcePublish);
        return size;
      }

      function scheduleSurfaceFit(publishResize, delay) {
        if (!surfaceReady) {
          startSurface();
          return;
        }
        pendingResizePublish = pendingResizePublish || !!publishResize;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          resizeTimer = null;
          if (resizeFrame !== null) cancelAnimationFrame(resizeFrame);
          resizeFrame = requestAnimationFrame(() => {
            resizeFrame = null;
            const shouldPublish = pendingResizePublish;
            pendingResizePublish = false;
            fitSurface(shouldPublish, false);
          });
        }, Math.max(0, Number(delay) || 0));
      }

      function publishSession(immediate) {
        clearTimeout(sessionPublishTimer);
        const publish = () => {
          try { AndroidTerminal.onSession(sessionId || '', lastSequence); } catch (_) {}
        };
        if (immediate) publish(); else sessionPublishTimer = setTimeout(publish, 750);
      }

      function publishState(state, message) {
        try { AndroidTerminal.onState(String(state || ''), String(message || '')); } catch (_) {}
      }

      function send(payload) {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify(payload));
          return true;
        }
        return false;
      }

      function requestConnection(delay) {
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(() => {
          if (detached || (sessionEnded && !newSessionRequested) || reconnectRequested) return;
          reconnectRequested = true;
          const size = currentDimensions();
          try {
            AndroidTerminal.requestConnection(sessionId || '', lastSequence, size.cols, size.rows);
          } catch (error) {
            reconnectRequested = false;
            publishState('error', String(error));
          }
        }, Math.max(0, delay || 0));
      }

      function scheduleReconnect(reason) {
        if (detached || sessionEnded) return;
        const delays = [1000, 2000, 4000, 8000, 15000];
        const delay = delays[Math.min(reconnectAttempt, delays.length - 1)];
        reconnectAttempt += 1;
        publishState('reconnecting', `${reason || 'Соединение закрыто'}. Повтор через ${Math.ceil(delay / 1000)} с.`);
        requestConnection(delay);
      }

      function connect(spec) {
        detached = false;
        sessionEnded = false;
        newSessionRequested = false;
        reconnectRequested = false;
        clearTimeout(reconnectTimer);
        const current = ++generation;
        if (socket) {
          try { socket.onclose = null; socket.close(); } catch (_) {}
        }
        if (spec.sessionId) sessionId = String(spec.sessionId);
        if (Number.isFinite(Number(spec.lastSequence))) lastSequence = Math.max(lastSequence, Number(spec.lastSequence));
        publishState('connecting', sessionId ? 'Восстанавливаем PTY-сессию…' : 'Открываем PTY-сессию…');

        try {
          socket = new WebSocket(String(spec.webSocketUrl));
        } catch (error) {
          scheduleReconnect(`WebSocket недоступен: ${error}`);
          return;
        }
        socket.onopen = () => {
          if (current !== generation) return;
          reconnectAttempt = 0;
          const size = fitSurface(false, false);
          publishPtyResize(size, true);
          terminal.writeln('\x1b[38;5;75m[PTY] Соединение установлено\x1b[0m');
          scheduleSurfaceFit(false, 0);
        };
        socket.onmessage = (event) => {
          if (current !== generation) return;
          let message;
          try { message = JSON.parse(event.data); } catch (_) { return; }
          if (message.type === 'init') {
            const incomingSessionId = String(message.session_id || sessionId || '');
            if (!message.reused || (sessionId && incomingSessionId !== sessionId)) lastSequence = 0;
            sessionId = incomingSessionId;
            publishSession(true);
            publishState('connected', `PTY подключён${message.shell ? ': ' + message.shell : ''}`);
            terminal.writeln(`\x1b[38;5;75m[PTY] ${message.shell || 'shell'}${message.reused ? ' · сессия восстановлена' : ''}\x1b[0m`);
            scheduleSurfaceFit(true, 0);
            if (!message.reused) {
              // A fresh interactive ash may start before the WebSocket is attached and not repaint
              // its prompt. A blank command is harmless and guarantees a visible prompt.
              setTimeout(() => send({ type: 'input', data: '\r' }), 120);
            }
          } else if (message.type === 'output') {
            if (typeof message.data === 'string') terminal.write(message.data);
            lastSequence = Math.max(lastSequence, Number(message.seq) || 0);
            publishSession(false);
          } else if (message.type === 'exit') {
            terminal.writeln(`\r\n[PTY завершён, код ${Number(message.code) || 0}]`);
            sessionId = null;
            lastSequence = 0;
            sessionEnded = !newSessionRequested;
            publishSession(true);
            publishState('closed', 'PTY-сессия завершена.');
          } else if (message.type === 'error') {
            terminal.writeln(`\r\n[PTY] ${String(message.message || 'Ошибка терминала')}`);
            publishState('error', String(message.message || 'Ошибка терминала'));
          }
        };
        socket.onerror = () => {
          if (current === generation) publishState('error', 'Ошибка WebSocket терминала.');
        };
        socket.onclose = () => {
          if (current !== generation || detached) return;
          socket = null;
          if (newSessionRequested) return;
          scheduleReconnect('Связь с PTY потеряна');
        };
      }

      terminal.onData(data => send({ type: 'input', data }));
      const resizeObserver = new ResizeObserver(() => {
        if (!surfaceReady) startSurface();
        else scheduleSurfaceFit(true, RESIZE_SETTLE_DELAY_MS);
      });
      resizeObserver.observe(terminalHost);
      terminalHost.addEventListener('mousedown', () => {
        try { terminal.focus(); } catch (_) {}
      });
      terminalHost.addEventListener('click', () => {
        try { terminal.focus(); } catch (_) {}
      }, { passive: true });
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) scheduleSurfaceFit(true, RESIZE_SETTLE_DELAY_MS);
      });

      window.XkeenTerminal = {
        connect,
        reconnect: () => { sessionEnded = false; requestConnection(0); },
        newSession: () => {
          sessionEnded = false;
          newSessionRequested = true;
          if (socket && socket.readyState === WebSocket.OPEN) send({ type: 'close' });
          sessionId = null;
          lastSequence = 0;
          publishSession(true);
          terminal.reset();
          requestConnection(120);
        },
        signal: name => send({ type: 'signal', name: String(name || 'INT') }),
        input: data => send({ type: 'input', data: String(data || '') }),
        clear: () => terminal.clear(),
        focus: () => terminal.focus(),
        selection: () => terminal.getSelection(),
        paste: text => terminal.paste(String(text || '')),
        findNext: query => searchAddon.findNext(String(query || ''), { caseSensitive: false, incremental: true }),
        findPrevious: query => searchAddon.findPrevious(String(query || ''), { caseSensitive: false }),
        connectionRequestFailed: message => {
          reconnectRequested = false;
          publishState('error', String(message || 'Не удалось запросить PTY-подключение.'));
        },
        detach: () => {
          publishSession(true);
          detached = true;
          generation += 1;
          clearTimeout(reconnectTimer);
          clearTimeout(resizeTimer);
          if (resizeFrame !== null) cancelAnimationFrame(resizeFrame);
          if (socket) { try { socket.onclose = null; socket.close(); } catch (_) {} }
          socket = null;
        }
      };

      Promise.resolve(document.fonts ? document.fonts.ready : undefined)
        .catch(() => undefined)
        .then(() => {
          fontsReady = true;
          startSurface();
        });
    })();
  </script>
</body>
</html>
