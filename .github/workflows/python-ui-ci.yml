name: Python UI CI

on:
  push:
    branches: [main]
    paths:
      - "xkeen-ui/**/*.py"
      - "tests/**/*.py"
      - ".github/workflows/python-ui-ci.yml"
      - "requirements-dev.txt"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "xkeen-ui/**/*.py"
      - "tests/**/*.py"
      - ".github/workflows/python-ui-ci.yml"
      - "requirements-dev.txt"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  lint:
    name: Ruff lint (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff check
        run: |
          python -m ruff check xkeen-ui tests

  test:
    name: Pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Syntax check
        run: |
          python -m compileall -q xkeen-ui

      - name: Run tests
        env:
          PYTHONPATH: xkeen-ui
          XKEEN_UI_SECRET_KEY: ci-secret
        run: |
          python -m pytest -q
