name: CI

on:
  push:
    branches:
      - main
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Recreate frontend bridge manifest
        run: python scripts/sync_frontend_build_manifest.py

      - name: Run Python tests
        run: python -m pytest -q

      - name: Verify frontend build
        run: node scripts/verify_frontend_build.mjs
