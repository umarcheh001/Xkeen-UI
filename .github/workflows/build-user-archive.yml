name: Build user archive

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-user-archive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: tools/xk-geodat/go.sum

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Recreate frontend bridge manifest
        run: python scripts/sync_frontend_build_manifest.py

      - name: Run Python tests
        run: python -m pytest -q

      - name: Verify frontend build
        run: node scripts/verify_frontend_build.mjs

      - name: Prepare package directory
        run: |
          rm -rf dist package-root
          mkdir -p dist package-root/xkeen-ui
          rsync -a xkeen-ui/ package-root/xkeen-ui/ \
            --exclude '__pycache__' \
            --exclude '.DS_Store'

      - name: Create user archive
        run: |
          tar -czf dist/xkeen-ui-routing.tar.gz -C package-root xkeen-ui
          sha256sum dist/xkeen-ui-routing.tar.gz > dist/xkeen-ui-routing.tar.gz.sha256

      - name: Build xk-geodat binaries
        working-directory: tools/xk-geodat
        run: |
          mkdir -p ../../dist

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -trimpath -ldflags="-s -w" \
            -o ../../dist/xk-geodat-linux-arm64 \
            ./cmd/xk-geodat

          CGO_ENABLED=0 GOOS=linux GOARCH=mips GOMIPS=softfloat go build \
            -trimpath -ldflags="-s -w" \
            -o ../../dist/xk-geodat-linux-mips \
            ./cmd/xk-geodat

          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build \
            -trimpath -ldflags="-s -w" \
            -o ../../dist/xk-geodat-linux-mipsle \
            ./cmd/xk-geodat

      - name: Create checksums
        run: |
          sha256sum dist/xkeen-ui-routing.tar.gz > dist/xkeen-ui-routing.tar.gz.sha256
          sha256sum dist/xk-geodat-linux-arm64 > dist/xk-geodat-linux-arm64.sha256
          sha256sum dist/xk-geodat-linux-mips > dist/xk-geodat-linux-mips.sha256
          sha256sum dist/xk-geodat-linux-mipsle > dist/xk-geodat-linux-mipsle.sha256

          sha256sum \
            dist/xkeen-ui-routing.tar.gz \
            dist/xk-geodat-linux-arm64 \
            dist/xk-geodat-linux-mips \
            dist/xk-geodat-linux-mipsle \
            > dist/SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: |
            dist/xkeen-ui-routing.tar.gz
            dist/xkeen-ui-routing.tar.gz.sha256
            dist/xk-geodat-linux-arm64
            dist/xk-geodat-linux-arm64.sha256
            dist/xk-geodat-linux-mips
            dist/xk-geodat-linux-mips.sha256
            dist/xk-geodat-linux-mipsle
            dist/xk-geodat-linux-mipsle.sha256
            dist/SHA256SUMS

      - name: Ensure GitHub CLI is available
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/xkeen-ui-routing.tar.gz \
              dist/xkeen-ui-routing.tar.gz.sha256 \
              dist/xk-geodat-linux-arm64 \
              dist/xk-geodat-linux-arm64.sha256 \
              dist/xk-geodat-linux-mips \
              dist/xk-geodat-linux-mips.sha256 \
              dist/xk-geodat-linux-mipsle \
              dist/xk-geodat-linux-mipsle.sha256 \
              dist/SHA256SUMS \
              --clobber
          else
            gh release create "$TAG" \
              dist/xkeen-ui-routing.tar.gz \
              dist/xkeen-ui-routing.tar.gz.sha256 \
              dist/xk-geodat-linux-arm64 \
              dist/xk-geodat-linux-arm64.sha256 \
              dist/xk-geodat-linux-mips \
              dist/xk-geodat-linux-mips.sha256 \
              dist/xk-geodat-linux-mipsle \
              dist/xk-geodat-linux-mipsle.sha256 \
              dist/SHA256SUMS \
              --title "$TAG" \
              --generate-notes
          fi
