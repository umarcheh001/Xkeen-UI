name: Release xkeen-ui-routing (tar.gz + sha256)

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare BUILD.json inside xkeen-ui/
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          if [ -z "${TAG:-}" ] || [ "${TAG:-}" = "null" ]; then
            TAG="${GITHUB_REF_NAME:-}"
          fi
          if [ -z "${TAG:-}" ]; then
            echo "ERROR: tag is empty. Run on a Release or provide a tag ref."
            exit 1
          fi

          VERSION="${TAG#v}"

          RELEASE_DATE="${{ github.event.release.published_at }}"
          if [ -z "${RELEASE_DATE:-}" ] || [ "${RELEASE_DATE:-}" = "null" ]; then
            RELEASE_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          UPDATE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/xkeen-ui-routing.tar.gz"

          mkdir -p xkeen-ui

          python3 - <<PY
          import json, os
          data = {
            "version": "${VERSION}",
            "release_date": "${RELEASE_DATE}",
            "update_url": "${UPDATE_URL}",
          }
          path = os.path.join("xkeen-ui", "BUILD.json")
          with open(path, "w", encoding="utf-8") as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
            f.write("\n")
          print("Wrote", path, data)
          PY

      - name: Build tarball (includes generated BUILD.json)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # Tracked files (exclude .github), plus generated xkeen-ui/BUILD.json
          git ls-files > /tmp/files.txt
          grep -vE '^\.github/' /tmp/files.txt > /tmp/files2.txt
          echo "xkeen-ui/BUILD.json" >> /tmp/files2.txt

          tar -czf dist/xkeen-ui-routing.tar.gz -T /tmp/files2.txt

          echo "Archive top:"
          tar -tzf dist/xkeen-ui-routing.tar.gz | head -n 15

      - name: Compute sha256 sidecar
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum xkeen-ui-routing.tar.gz | awk '{print $1"  xkeen-ui-routing.tar.gz"}' > xkeen-ui-routing.tar.gz.sha256
          cat xkeen-ui-routing.tar.gz.sha256

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/xkeen-ui-routing.tar.gz
            dist/xkeen-ui-routing.tar.gz.sha256
