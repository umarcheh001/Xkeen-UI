name: xk-geodat (release binaries)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (only for manual runs)"
        required: false

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/xk-geodat/go.mod
          cache: true
          cache-dependency-path: |
            tools/xk-geodat/go.mod
            tools/xk-geodat/go.sum

      - name: Test
        working-directory: tools/xk-geodat
        run: |
          set -euo pipefail
          go test ./...

      - name: Build (linux arm64 + linux mips softfloat + linux mipsle softfloat)
        working-directory: tools/xk-geodat
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          build_one () {
            local goos="$1"
            local goarch="$2"
            local out="$3"
            local gomips="${4:-}"

            echo "==> build ${out} (GOOS=${goos} GOARCH=${goarch} GOMIPS=${gomips})"
            if [[ -n "${gomips}" ]]; then
              CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" GOMIPS="${gomips}"                 go build -trimpath -ldflags "-s -w" -o "dist/${out}" ./cmd/xk-geodat
            else
              CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}"                 go build -trimpath -ldflags "-s -w" -o "dist/${out}" ./cmd/xk-geodat
            fi

            (cd dist && sha256sum "${out}" > "${out}.sha256")
          }

          build_one linux arm64  xk-geodat-linux-arm64
          build_one linux mips   xk-geodat-linux-mips   softfloat
          build_one linux mipsle xk-geodat-linux-mipsle softfloat

          (cd dist && sha256sum xk-geodat-linux-arm64 xk-geodat-linux-mips xk-geodat-linux-mipsle > SHA256SUMS)

      - name: Upload assets to GitHub Release (clobber)
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: tools/xk-geodat
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          if [[ -z "${TAG}" ]]; then
            TAG="${{ inputs.tag }}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "ERROR: tag is empty. Run on a Release publish event, or provide workflow_dispatch input 'tag'."
            exit 1
          fi

          echo "Uploading assets to release: ${TAG}"
          gh release upload "${TAG}"             "dist/xk-geodat-linux-arm64"             "dist/xk-geodat-linux-arm64.sha256"             "dist/xk-geodat-linux-mips"             "dist/xk-geodat-linux-mips.sha256"             "dist/xk-geodat-linux-mipsle"             "dist/xk-geodat-linux-mipsle.sha256"             "dist/SHA256SUMS"             --clobber
