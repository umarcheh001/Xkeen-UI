<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Xkeen UI — Бэкапы Xray конфигов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
  <meta name="theme-color" content="#0f172a">
  <!-- Apply typography prefs ASAP (stored in localStorage) -->
  <script src="{{ url_for('static', filename='js/ui/typography.js', v='20251230c') }}"></script>
  <!-- Apply layout prefs ASAP (stored in localStorage) -->
  <script src="{{ url_for('static', filename='js/ui/layout.js', v='20260101c') }}"></script>
  <script src="{{ url_for('static', filename='js/ui/xk_brand.js', v='20260104a') }}"></script>
    <script>
    (function () {
      var theme = 'light';
      try {
        var attr = document.documentElement.getAttribute('data-theme');
        var stored = localStorage.getItem('xkeen-theme');
        if (attr === 'light' || attr === 'dark') {
          theme = attr;
        } else if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }
      } catch (e) {
        try {
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'dark';
          }
        } catch (e2) {}
      }
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='20260325c') }}">
<link rel="stylesheet" id="xk-custom-theme-link" href="{{ url_for('custom_theme_css', v=custom_theme_v) }}">
<link rel="stylesheet" id="xk-terminal-theme-link" href="{{ url_for('terminal_theme_css', v=terminal_theme_v) }}">
<link rel="stylesheet" id="xk-codemirror-theme-link" href="{{ url_for('codemirror_theme_css', v=codemirror_theme_v) }}">
{% if custom_css_enabled and not safe_mode %}
<link rel="stylesheet" id="xk-custom-css-link" href="{{ url_for('custom_css', v=custom_css_v) }}">
{% endif %}
</head>
<body class="xk-backups-page">
  <div id="global-xkeen-spinner">
    <div class="global-spinner-box">
      <div class="global-spinner-icon"></div>
      <div class="global-spinner-text" id="global-xkeen-spinner-text">
        Применяем изменения и перезапускаем xkeen…
      </div>
    </div>
  </div>

  <!-- Wider container (match DevTools page width) -->
  <div class="container container-wide">
    <header class="panel-header xk-backups-page-header">
      <div class="xk-backups-header-main">
        <div class="xk-backups-header-title">
          <h1>Бэкапы Xray конфигов</h1>
        </div>
        <div class="header-actions">

            <div
              class="xk-global-header-activity"
              data-xk-global-spinner-anchor
              aria-live="polite"
              aria-atomic="true"
              aria-label="Операция выполняется…"
              title="Операция выполняется…"
            >
              <span class="xk-global-header-activity__icon" aria-hidden="true"></span>
              <span class="xk-visually-hidden" data-xk-global-spinner-text>Операция выполняется…</span>
            </div>
          <button
            type="button"
            id="theme-toggle-btn"
            class="theme-toggle-btn theme-toggle-header xk-header-btn xk-header-btn-theme"
            aria-label="Переключить тему"
          ><span class="theme-toggle-icon" aria-hidden="true">☀</span><span class="theme-toggle-text">Светлая тема</span></button>
          <a
            href="{{ url_for('index') }}"
            class="service-core-text xk-header-btn xk-header-btn-ui"
            title="Назад на главную панель"
          >← Назад</a>
          <a
            href="{{ url_for('devtools_page') }}"
            class="service-core-text xk-header-btn xk-header-btn-devtools"
            title="DevTools"
          >DevTools</a>
          <a
            href="{{ url_for('devtools_page') }}#dt-update-card"
            id="xk-update-link"
            class="service-core-text xk-header-btn xk-header-btn-devtools hidden"
            title="Обновление"
          >
            <span class="xk-update-dot" aria-hidden="true"></span>
            <span data-xk-update-label>Обновление</span>
          </a>
          <a
            href="{{ url_for('logout') }}"
            class="service-core-text xk-header-btn xk-header-btn-logout"
            title="Выйти из панели"
          >Выйти</a>
        </div>
      </div>
    </header>

    <section class="card xk-backups-table-card">
      <table id="backups-table" data-mode="history">
        <thead>
          <tr>
            <th>Имя файла</th>
            <th>Размер</th>
            <th>Создан</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody>
          <tr class="backups-empty-row">
            <td colspan="4">Загрузка списка бэкапов…</td>
          </tr>
        </tbody>
      </table>
    </section>

    <div id="backups-status" class="status"></div>


    <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Подтверждение">
      <div class="modal-content" style="max-width: 520px;" data-modal-key="backups-confirm">
        <div class="modal-header">
          <span class="modal-title" id="confirm-modal-title">Подтверждение</span>
          <button type="button" class="modal-close" id="confirm-modal-close-btn" title="Закрыть">×</button>
        </div>
        <div class="modal-body">
          <p id="confirm-modal-message" class="modal-description" style="white-space: pre-line; margin: 0;"></p>
        </div>
        <div class="modal-actions" style="justify-content:flex-end;">
          <button type="button" id="confirm-modal-cancel-btn" class="btn-secondary">Отменить</button>
          <button type="button" id="confirm-modal-ok-btn" class="btn-danger">Подтвердить</button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <footer>
      <small>Xkeen UI — управление бэкапами.</small>
    </footer>
  </div>
	<!-- Modular: page init + feature logic (no main.js on this page) -->
  <!-- Frontend workspace entrypoint (step 37). -->
  <script type="module" src="{{ frontend_page_entry_url('backups') }}"></script>
</body>
</html>
