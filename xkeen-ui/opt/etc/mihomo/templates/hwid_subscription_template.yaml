proxy-groups:
- name: VPN
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hijacking.png
  include-all: true
  proxies: ["⚡️ Fastest"]
- name: ⚡️ Fastest
  type: url-test
  exclude-filter: "🇷🇺"
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
  include-all: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 150
- name: AI
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png
  include-all: true
  proxies: ["VPN","⚡️ Fastest",DIRECT]
- name: YouTube
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png
  include-all: true
  proxies: ["VPN","⚡️ Fastest",DIRECT]
- name: Amazon
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Amazon.png
  include-all: true
  proxies: [DIRECT,"VPN","⚡️ Fastest"]
- name: Cloudflare
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cloudflare.png
  include-all: true
  proxies: [DIRECT,"VPN","⚡️ Fastest"]
- name: Meta
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Facebook.png
  include-all: true
  proxies: ["VPN","⚡️ Fastest",DIRECT]
- name: Spotify
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png
  include-all: true
  proxies: [DIRECT,"VPN","⚡️ Fastest"]
- name: PlayStation
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/PlayStation.png
  include-all: true
  proxies: [DIRECT, "VPN","⚡️ Fastest"]
- name: Xbox
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Xbox.png
  include-all: true
  proxies: [DIRECT, "VPN","⚡️ Fastest"]
- name: Telegram
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
  include-all: true
  proxies: ["VPN","⚡️ Fastest",DIRECT]
- name: Steam
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Steam.png
  include-all: true
  proxies: [DIRECT,"VPN","⚡️ Fastest"]
- name: Discord
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Discord.png
  include-all: true
  proxies: ["VPN","⚡️ Fastest",DIRECT]
- name: Заблокировано в РФ
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Filter.png
  include-all: true
  proxies: ["VPN","⚡️ Fastest",DIRECT]
- name: Недоступно из РФ
  type: select
  icon: https://upload.wikimedia.org/wikipedia/commons/e/ed/RKN_site_logo_%282013-2021%29.png
  include-all: true
  proxies: ["VPN","⚡️ Fastest",DIRECT]
- name: Остальное
  type: select
  icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
  include-all: true
  proxies: [DIRECT,"⚡️ Fastest","VPN"]
